<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Digital Clock & Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="status-indicator">
            <span id="mode-label">CURRENT TIME</span>
        </header>

        <main class="display-container">
            <div id="time-display" class="time-text">00:00:00</div>
            <div id="ms-display" class="ms-text">.00</div>
        </main>

        <footer class="controls">
            <button id="start-stop-btn" class="btn primary">START</button>
            <button id="reset-btn" class="btn secondary">RESET</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
